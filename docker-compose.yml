services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: pharmaflow_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PORT=8000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pharmaflow_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
